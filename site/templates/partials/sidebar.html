<div id="sidebar">
<h1>{{ config.extra.title }}</h1>
<h2>{{ config.extra.subtitle }}</h2>
<div id="menu">
{% for item in config.extra.menu %}
<a {% if (current_path == item.path) or (item.path != "/" and current_path is containing(item.path)) %} class="active" {% endif %}href="{{ item.path }}">{{ item.name }}</a>
{% endfor %}
</div>
</div>
