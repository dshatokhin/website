{% extends "base.html" %}
{% block title %}Tags | {{ config.extra.title }}{% endblock title %}
{% block content %}
<h1>Tags</h1>
{% for term in terms %}
<h3><a href="{{ term.permalink }}">{{ term.name }}</a></h3>
<p>{{ term.pages | length }} post{{ term.pages | length | pluralize }}</p>
{% endfor %}
{% endblock content %}
